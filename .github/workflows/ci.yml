name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - uses: actions/checkout@v4
      
      - uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      
      - name: Typecheck
        run: pnpm -r typecheck
      
      - name: Lint
        run: pnpm -r lint
        continue-on-error: false

      # Route-registration smoke check for @printsbytee/api.
      # Does NOT need a live Postgres — it only introspects Hono's
      # internal router table. `env.ts` validates required env vars on
      # import though, so we supply placeholder values.
      - name: Smoke check routes (@printsbytee/api)
        env:
          DATABASE_URL: postgres://test:test@localhost:5432/test
          SESSION_SECRET: ci-test-session-secret-placeholder-32chars
          INTERNAL_API_KEY: ci-internal-api-key-placeholder-32chars
        run: pnpm --filter @printsbytee/api exec tsx scripts/smoke-check-routes.ts

      - name: Build
        run: pnpm -r build
